## Set fixed base URL only when reverse-proxy/local context path makes {baseUrl} unstable.
## Example: http://localhost:8080/HiFive
oauth2.base-url=

## Google OAuth Console redirect URI example:
## http://localhost:8080/HiFive/login/oauth2/code/google
oauth2.google.client-id=GOOGLE_CLIENT_ID
oauth2.google.client-secret=GOOGLE_CLIENT_SECRET

## Kakao Developers redirect URI example:
## http://localhost:8080/HiFive/login/oauth2/code/kakao
## If "Client Secret" is not activated, this can stay blank.
oauth2.kakao.client-id=KAKAO_REST_API_KEY
oauth2.kakao.client-secret=

## Naver Developers redirect URI example:
## http://localhost:8080/HiFive/login/oauth2/code/naver
## Naver uses client secret as required.
oauth2.naver.client-id=NAVER_CLIENT_ID
oauth2.naver.client-secret=NAVER_CLIENT_SECRET
