## Enable mail sender in production/staging only after SMTP values are set.
mail.enabled=false

## SMTP settings
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.username=YOUR_SMTP_USERNAME
mail.smtp.password=YOUR_SMTP_APP_PASSWORD
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.connectiontimeout=5000
mail.smtp.timeout=5000
mail.smtp.writetimeout=5000

## From address
mail.from=no-reply@hifive.local
